[package]
name = "refkit"
version = "0.0.0"
edition = "2024"
license = "MIT"
readme = "README.md"
description = "Python bindings for fast citation parsing, rendering, and BibTeX editing"
repository = "https://github.com/petergy/refkit"
include = [
    "/Cargo.toml",
    "/pyproject.toml",
    "/README.md",
    "/src",
    "/tests",
]

[lib]
name = "_native"
crate-type = ["cdylib", "rlib"]

[features]
default = []
extension-module = ["pyo3/extension-module", "pyo3/abi3-py311"]

[dependencies]
biblatex = { version = "0.12.0", features = ["unic-langid"] }
hayagriva = { version = "0.10.0", features = ["csl-json"] }
indexmap = "2.12.1"
pyo3 = "0.28.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"

[dev-dependencies]
pyo3 = { version = "0.28.2", features = ["auto-initialize"] }

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
