[project]
name = "refkit"
version = "0.0.0"
description = "Fast Python citation parsing, rendering, and BibTeX editing backed by Rust"
readme = "README.md"
authors = [
    { name = "Péter Ferenc Gyarmati", email = "dev.petergy@gmail.com" }
]
requires-python = ">=3.11,<3.15"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Rust",
    "Typing :: Typed",
]
dependencies = []

[build-system]
requires = ["maturin>=1.9,<2"]
build-backend = "maturin"

[tool.maturin]
python-source = "src"
module-name = "refkit._native"
bindings = "pyo3"
features = ["extension-module"]
editable-profile = "dev"
strip = true

[dependency-groups]
dev = [
    { include-group = "benchmark" },
    "maturin>=1.9,<2",
    "pytest>=9.0.3",
    "pytest-cov>=7.0.0",
    "ruff>=0.15.16",
    "ty>=0.0.46",
]
benchmark = [
    "bibtexparser>=1.4.4",
    "citeproc-py>=0.9.3",
    "citeproc-py-styles>=0.1.5",
    "pyperf>=2.9.0",
    "pytest>=9.0.3",
    "pytest-cov>=7.0.0",
]

[tool.pytest.ini_options]
testpaths = ["tests", "benchmark/tests"]
addopts = [
    "--cov=refkit",
    "--cov=benchmark",
    "--cov-branch",
    "--cov-report=term-missing",
    "--cov-fail-under=100",
]

[tool.coverage.run]
omit = ["benchmark/tests/*"]

[tool.ruff]
line-length = 100
target-version = "py311"
