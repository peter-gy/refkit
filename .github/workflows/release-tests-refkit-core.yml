name: refkit-core Release Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test-cpython:
    name: refkit-core / Test CPython wheel (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-os: Linux
            python-version: "3.11"
          - os: ubuntu-latest
            artifact-os: Linux
            python-version: "3.14"
          - os: macos-15
            artifact-os: macOS
            python-version: "3.11"
          - os: macos-15
            artifact-os: macOS
            python-version: "3.14"
          - os: windows-latest
            artifact-os: Windows
            python-version: "3.11"
          - os: windows-latest
            artifact-os: Windows
            python-version: "3.14"
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false
          ignore-empty-workdir: true

      - name: Download wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release_refkit_core_cpython_${{ matrix.artifact-os }}
          path: dist

      - name: Test installed package
        shell: bash
        run: |
          uv run --no-project --python "${{ matrix.python-version }}" --no-index --find-links dist --with refkit-core python - <<'PY'
          import refkit_core as core

          assert core.__version__
          assert core.build_info
          library = core.Library.parse_bibtex(
              "@article{doe2024, title={Fast Citations}, year={2024}}",
              recovery="error",
          )
          assert len(library) == 1
          PY

  test-pyemscripten:
    name: refkit-core / Test PyEmscripten wheel
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Download wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release_refkit_core_pyemscripten_3.14
          path: dist

      - name: Create Pyodide virtual environment
        uses: ./.github/actions/create-pyodide-venv

      - name: Test installed package
        run: |
          source .venv-pyodide/bin/activate
          python -m pip install refkit-core --no-index --no-deps --find-links dist --force-reinstall
          python - <<'PY'
          import refkit_core as core

          assert core.__version__
          assert core.build_info
          PY
