name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-checks:
    name: Source checks
    uses: ./.github/workflows/source-checks.yml

  build-refkit-pure:
    name: refkit / Build pure Python wheel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false

      - run: uv build --package refkit --no-create-gitignore

      - run: |
          uv run --locked --only-group build twine check --strict dist/refkit-*
          python scripts/distribution_contract.py dist/refkit-*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: refkit_pypi_files
          path: dist/refkit-*
          retention-days: 7
          if-no-files-found: error

  build-refkit-core-cpython:
    name: refkit-core / Build CPython wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.11"
          enable-cache: false

      - name: Configure reproducible Rust paths
        uses: ./.github/actions/configure-rust-build

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: "v0.16.0"

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: packages/refkit-core
          args: --locked --release --out dist --interpreter 3.11

      - run: python -c "from pathlib import Path; print('\\n'.join(p.name for p in Path('packages/refkit-core/dist').iterdir()))"

      - run: |
          python -m scripts.normalize_wheel packages/refkit-core/dist/*.whl
          uv run --locked --only-group build twine check --strict packages/refkit-core/dist/*
          python scripts/distribution_contract.py packages/refkit-core/dist/*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: refkit_core_pypi_files_${{ runner.os }}_cp311
          path: packages/refkit-core/dist
          retention-days: 7
          if-no-files-found: error

  build-refkit-core-wasm:
    name: refkit-core / Build PyEmscripten (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.14"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false

      - name: Set up Pyodide
        id: pyodide
        uses: ./.github/actions/setup-pyodide

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: "v0.16.0"

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        env:
          CARGO_TARGET_WASM32_UNKNOWN_EMSCRIPTEN_RUSTFLAGS: ${{ steps.pyodide.outputs.rustflags }}
          MATURIN_PYEMSCRIPTEN_PLATFORM_VERSION: ${{ steps.pyodide.outputs.pyodide-abi-version }}
        with:
          working-directory: packages/refkit-core
          target: wasm32-unknown-emscripten
          args: --locked --release --out dist --interpreter ${{ matrix.python-version }}
          rust-toolchain: ${{ steps.pyodide.outputs.rust-toolchain }}

      - run: ls -lh packages/refkit-core/dist

      - run: |
          python -m scripts.normalize_wheel packages/refkit-core/dist/*.whl
          uv run --locked --only-group build twine check --strict packages/refkit-core/dist/*
          python scripts/distribution_contract.py packages/refkit-core/dist/*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: refkit_core_pypi_files_pyemscripten_${{ matrix.python-version }}
          path: packages/refkit-core/dist
          retention-days: 7
          if-no-files-found: error

  build-native-sdists:
    name: ${{ matrix.package }} / Build sdist
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: refkit-core
            artifact: refkit_core_sdist
          - package: polars-refkit
            artifact: polars_refkit_sdist
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false

      - run: uv build --package ${{ matrix.package }} --sdist --out-dir dist --no-create-gitignore

      - run: |
          uv run --locked --only-group build twine check --strict dist/*
          python scripts/distribution_contract.py dist/*

      - name: Build and import package from sdist
        shell: bash
        env:
          PACKAGE: ${{ matrix.package }}
        run: |
          sdists=(dist/*.tar.gz)
          if [ "${#sdists[@]}" -ne 1 ]; then
            printf 'Expected one sdist for %s, found %s\n' "$PACKAGE" "${#sdists[@]}" >&2
            exit 1
          fi
          if [ "$PACKAGE" = "refkit-core" ]; then
            uv run --no-project --python "3.11" --with "${sdists[0]}" python - <<'PY'
          import refkit_core as core

          library = core.Library.parse_bibtex(
              "@article{doe2024, title={Fast Citations}, year={2024}}",
              recovery="error",
          )
          assert len(library) == 1
          PY
          else
            uv run --no-project --python "3.11" --with "${sdists[0]}" python - <<'PY'
          import polars as pl
          import polars_refkit

          frame = pl.DataFrame({"bibtex": ["@article{doe2024, title={Fast Citations}}"]})
          assert frame.select(pl.col("bibtex").refkit.entry_count()).item() == 1
          PY
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.tar.gz
          retention-days: 7
          if-no-files-found: error

  build-polars-refkit-cpython:
    name: polars-refkit / Build CPython wheel
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.11"
          enable-cache: false

      - name: Configure reproducible Rust paths
        uses: ./.github/actions/configure-rust-build

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: "v0.16.0"

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: packages/polars-refkit
          args: --locked --release --out dist --interpreter 3.11

      - run: |
          python -m scripts.normalize_wheel packages/polars-refkit/dist/*.whl
          uv run --locked --only-group build twine check --strict packages/polars-refkit/dist/*
          python scripts/distribution_contract.py packages/polars-refkit/dist/*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: polars_refkit_pypi_files_Linux_cp311
          path: packages/polars-refkit/dist
          retention-days: 7
          if-no-files-found: error

  build-polars-refkit-wasm:
    name: polars-refkit / Build PyEmscripten (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.14"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false

      - name: Set up Pyodide
        id: pyodide
        uses: ./.github/actions/setup-pyodide

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: "v0.16.0"

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        env:
          CARGO_TARGET_WASM32_UNKNOWN_EMSCRIPTEN_RUSTFLAGS: ${{ steps.pyodide.outputs.rustflags }}
          HOST_CC: cc
          MATURIN_PYEMSCRIPTEN_PLATFORM_VERSION: ${{ steps.pyodide.outputs.pyodide-abi-version }}
        with:
          working-directory: packages/polars-refkit
          target: wasm32-unknown-emscripten
          args: --locked --release --out dist --interpreter ${{ matrix.python-version }}
          rust-toolchain: ${{ steps.pyodide.outputs.rust-toolchain }}

      - run: ls -lh packages/polars-refkit/dist

      - run: |
          python -m scripts.normalize_wheel packages/polars-refkit/dist/*.whl
          uv run --locked --only-group build twine check --strict packages/polars-refkit/dist/*
          python scripts/distribution_contract.py packages/polars-refkit/dist/*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: polars_refkit_pypi_files_pyemscripten_${{ matrix.python-version }}
          path: packages/polars-refkit/dist
          retention-days: 7
          if-no-files-found: error

  test-pyemscripten:
    name: refkit / Test Pyodide install (${{ matrix.python-version }})
    needs:
      - build-refkit-pure
      - build-refkit-core-wasm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.14"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: refkit_core_pypi_files_pyemscripten_${{ matrix.python-version }}
          path: dist

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: refkit_pypi_files
          path: dist

      - uses: ./.github/actions/create-pyodide-venv

      - run: |
          source .venv-pyodide/bin/activate
          python -m pip install -r .github/pyodide/pylock.314.toml
          python -m pip install refkit --no-index --find-links dist
          python .github/pyodide/smoke_refkit.py
          python -m pytest -q -c /dev/null .github/pyodide/test_refkit_runtime.py

  test-polars-refkit-pyemscripten:
    name: polars-refkit / Test Pyodide install (${{ matrix.python-version }})
    needs:
      - build-refkit-pure
      - build-refkit-core-wasm
      - build-polars-refkit-wasm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.14"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: refkit_core_pypi_files_pyemscripten_${{ matrix.python-version }}
          path: dist

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: refkit_pypi_files
          path: dist

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: polars_refkit_pypi_files_pyemscripten_${{ matrix.python-version }}
          path: dist

      - uses: ./.github/actions/create-pyodide-venv

      - run: |
          source .venv-pyodide/bin/activate
          python -m pip install -r .github/pyodide/pylock.314.toml
          python -m pip install refkit --no-index --find-links dist
          python -m pip install dist/polars_refkit-*.whl
          python .github/pyodide/smoke_polars_refkit.py
          python -m pytest -q -c /dev/null \
            .github/pyodide/test_refkit_runtime.py \
            .github/pyodide/test_polars_refkit_runtime.py

  test-cpython-wheels:
    name: refkit / Test CPython wheels (${{ matrix.os }}, py${{ matrix.python-version }})
    needs:
      - build-refkit-pure
      - build-refkit-core-cpython
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-os: Linux
            python-version: "3.11"
          - os: ubuntu-latest
            artifact-os: Linux
            python-version: "3.14"
          - os: macos-15
            artifact-os: macOS
            python-version: "3.11"
          - os: macos-15
            artifact-os: macOS
            python-version: "3.14"
          - os: windows-latest
            artifact-os: Windows
            python-version: "3.11"
          - os: windows-latest
            artifact-os: Windows
            python-version: "3.14"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: refkit_core_pypi_files_${{ matrix.artifact-os }}_cp311
          path: dist

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: refkit_pypi_files
          path: dist

      - run: |
          uv run --no-project --python "${{ matrix.python-version }}" --no-index --find-links dist --with refkit python .github/pyodide/smoke_refkit.py

  test-polars-refkit-cpython:
    name: polars-refkit / Test CPython wheel (py${{ matrix.python-version }}, ${{ matrix.polars }})
    needs: build-polars-refkit-cpython
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            polars: polars==1.29.0
          - python-version: "3.14"
            polars: polars
    steps:
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false
          ignore-empty-workdir: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: polars_refkit_pypi_files_Linux_cp311
          path: dist

      - shell: bash
        run: |
          wheels=(dist/polars_refkit-*.whl)
          uv run --no-project --python "${{ matrix.python-version }}" --with "${{ matrix.polars }}" --with "${wheels[0]}" python - <<'PY'
          import polars as pl
          import polars_refkit

          assert polars_refkit
          df = pl.DataFrame(
              {
                  "bibtex": [
                      "@article{doe2024, title={Fast Citations}, year={2024}}",
                  ],
              }
          )
          out = df.select(count=pl.col("bibtex").refkit.entry_count())
          assert out.item() == 1
          PY

  check:
    name: Check
    if: always()
    needs:
      - source-checks
      - build-refkit-pure
      - build-refkit-core-cpython
      - build-refkit-core-wasm
      - build-native-sdists
      - build-polars-refkit-cpython
      - build-polars-refkit-wasm
      - test-pyemscripten
      - test-polars-refkit-pyemscripten
      - test-cpython-wheels
      - test-polars-refkit-cpython
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check required jobs
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python - <<'PY'
          import json
          import os

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {
              name: info["result"]
              for name, info in needs.items()
              if info["result"] != "success"
          }
          if failed:
              raise SystemExit(f"Required CI jobs did not all succeed: {failed}")
          PY
