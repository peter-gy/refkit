name: refkit Release Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test-cpython:
    name: refkit / Test CPython install (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-os: Linux
            python-version: "3.11"
          - os: ubuntu-latest
            artifact-os: Linux
            python-version: "3.14"
          - os: macos-15
            artifact-os: macOS
            python-version: "3.11"
          - os: macos-15
            artifact-os: macOS
            python-version: "3.14"
          - os: windows-latest
            artifact-os: Windows
            python-version: "3.11"
          - os: windows-latest
            artifact-os: Windows
            python-version: "3.14"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Download refkit distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release_refkit_dist
          path: dist

      - name: Download refkit-core wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release_refkit_core_cpython_${{ matrix.artifact-os }}
          path: dist

      - name: Test installed package
        shell: bash
        run: |
          uv run --no-project --python "${{ matrix.python-version }}" --no-index --find-links dist --with refkit python .github/pyodide/smoke_refkit.py

  test-pyemscripten:
    name: refkit / Test PyEmscripten install
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Download refkit distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release_refkit_dist
          path: dist

      - name: Download refkit-core wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release_refkit_core_pyemscripten_3.14
          path: dist

      - name: Create Pyodide virtual environment
        uses: ./.github/actions/create-pyodide-venv

      - name: Test installed package
        run: |
          source .venv-pyodide/bin/activate
          python -m pip install -r .github/pyodide/pylock.314.toml
          python -m pip install refkit --no-index --find-links dist --force-reinstall
          python .github/pyodide/smoke_refkit.py
          python -m pytest -q -c /dev/null .github/pyodide/test_refkit_runtime.py
