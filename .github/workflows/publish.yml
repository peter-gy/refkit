name: Publish

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: read

env:
  SCCACHE_GHA_RW_MODE: READ_ONLY

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  source-checks:
    name: Source checks
    uses: ./.github/workflows/source-checks.yml

  check-release-version:
    name: Check release version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Check package versions
        id: version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version=$(python scripts/release_contract.py --tag "$RELEASE_TAG")
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-refkit-core-sdist:
    name: refkit-core / Build sdist
    needs: check-release-version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: "v0.16.0"

      - name: Build sdist
        run: uv build --package refkit-core --sdist --out-dir dist/refkit-core --no-create-gitignore

      - name: Build and import from sdist
        shell: bash
        run: |
          sdists=(dist/refkit-core/refkit_core-*.tar.gz)
          if [ "${#sdists[@]}" -ne 1 ]; then
            printf 'Expected one refkit-core sdist, found %s\n' "${#sdists[@]}" >&2
            exit 1
          fi
          uv run --no-project --python "3.11" --with "${sdists[0]}" python - <<'PY'
          import refkit_core as core

          assert core.__version__
          PY

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release_refkit_core_sdist
          path: dist/refkit-core/*.tar.gz
          retention-days: 7
          if-no-files-found: error

  build-refkit-core-cpython:
    name: refkit-core / Build CPython wheel (${{ matrix.os }})
    needs: check-release-version
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.11"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Configure reproducible Rust paths
        uses: ./.github/actions/configure-rust-build

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: "v0.16.0"

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: packages/refkit-core
          args: --locked --release --out dist --interpreter 3.11

      - name: Check metadata
        run: |
          python -m scripts.normalize_wheel packages/refkit-core/dist/*.whl
          uv run --locked --only-group build twine check --strict packages/refkit-core/dist/*
          python scripts/distribution_contract.py packages/refkit-core/dist/*

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release_refkit_core_cpython_${{ runner.os }}
          path: packages/refkit-core/dist/*.whl
          retention-days: 7
          if-no-files-found: error

  build-refkit-core-wasm:
    name: refkit-core / Build PyEmscripten wheel (${{ matrix.python-version }})
    needs: check-release-version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.14"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Set up Pyodide
        id: pyodide
        uses: ./.github/actions/setup-pyodide

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: "v0.16.0"

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        env:
          CARGO_TARGET_WASM32_UNKNOWN_EMSCRIPTEN_RUSTFLAGS: ${{ steps.pyodide.outputs.rustflags }}
          MATURIN_PYEMSCRIPTEN_PLATFORM_VERSION: ${{ steps.pyodide.outputs.pyodide-abi-version }}
        with:
          working-directory: packages/refkit-core
          target: wasm32-unknown-emscripten
          args: --locked --release --out dist --interpreter ${{ matrix.python-version }}
          rust-toolchain: ${{ steps.pyodide.outputs.rust-toolchain }}

      - name: Check metadata
        run: |
          python -m scripts.normalize_wheel packages/refkit-core/dist/*.whl
          uv run --locked --only-group build twine check --strict packages/refkit-core/dist/*
          python scripts/distribution_contract.py packages/refkit-core/dist/*

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release_refkit_core_pyemscripten_${{ matrix.python-version }}
          path: packages/refkit-core/dist/*.whl
          retention-days: 7
          if-no-files-found: error

  test-refkit-core:
    name: refkit-core / Test release artifacts
    needs:
      - build-refkit-core-cpython
      - build-refkit-core-wasm
    uses: ./.github/workflows/release-tests-refkit-core.yml

  publish-refkit-core:
    name: refkit-core / Publish to PyPI
    needs:
      - check-release-version
      - source-checks
      - build-refkit-core-sdist
      - build-refkit-core-cpython
      - build-refkit-core-wasm
      - test-refkit-core
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release_refkit_core_*
          merge-multiple: true
          path: dist/refkit-core

      - name: Publish package
        run: |
          for whl in dist/refkit-core/*.whl
          do
            unzip -qt "$whl"
          done
          uv run --locked --only-group build twine check --strict dist/refkit-core/*
          python scripts/distribution_contract.py dist/refkit-core/*
          uv publish --trusted-publishing always \
            --check-url https://pypi.org/simple \
            dist/refkit-core/*

  build-refkit:
    name: refkit / Build distribution
    needs: check-release-version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Build distribution
        run: uv build --package refkit --out-dir dist/refkit --no-create-gitignore

      - name: Check metadata
        run: |
          uv run --locked --only-group build twine check --strict dist/refkit/*
          python scripts/distribution_contract.py dist/refkit/*

      - name: Upload distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release_refkit_dist
          path: dist/refkit/*
          retention-days: 7
          if-no-files-found: error

  test-refkit:
    name: refkit / Test release artifacts
    needs:
      - build-refkit
      - build-refkit-core-cpython
      - build-refkit-core-wasm
    uses: ./.github/workflows/release-tests-refkit.yml

  publish-refkit:
    name: refkit / Publish to PyPI
    needs:
      - check-release-version
      - source-checks
      - publish-refkit-core
      - build-refkit
      - test-refkit
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Download distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release_refkit_dist
          path: dist/refkit

      - name: Publish package
        run: |
          uv run --locked --only-group build twine check --strict dist/refkit/*
          python scripts/distribution_contract.py dist/refkit/*
          uv publish --trusted-publishing always \
            --check-url https://pypi.org/simple \
            dist/refkit/*

  build-polars-refkit-sdist:
    name: polars-refkit / Build sdist
    needs: check-release-version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: "v0.16.0"

      - name: Build sdist
        run: uv build --package polars-refkit --sdist --out-dir dist/polars-refkit --no-create-gitignore

      - name: Build and import from sdist
        shell: bash
        run: |
          sdists=(dist/polars-refkit/polars_refkit-*.tar.gz)
          if [ "${#sdists[@]}" -ne 1 ]; then
            printf 'Expected one polars-refkit sdist, found %s\n' "${#sdists[@]}" >&2
            exit 1
          fi
          uv run --no-project --python "3.11" --with "${sdists[0]}" python - <<'PY'
          import polars_refkit

          assert polars_refkit
          PY

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release_polars_refkit_sdist
          path: dist/polars-refkit/*.tar.gz
          retention-days: 7
          if-no-files-found: error

  build-polars-refkit-cpython:
    name: polars-refkit / Build CPython wheel (${{ matrix.os }})
    needs: check-release-version
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      SCCACHE_GHA_ENABLED: ${{ matrix.os == 'ubuntu-latest' && 'true' || '' }}
      RUSTC_WRAPPER: ${{ matrix.os == 'ubuntu-latest' && 'sccache' || '' }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.11"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Configure reproducible Rust paths
        uses: ./.github/actions/configure-rust-build

      - name: Set up sccache
        if: matrix.os == 'ubuntu-latest'
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: "v0.16.0"

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: packages/polars-refkit
          args: --locked --release --out dist --interpreter 3.11

      - name: Check metadata
        run: |
          python -m scripts.normalize_wheel packages/polars-refkit/dist/*.whl
          uv run --locked --only-group build twine check --strict packages/polars-refkit/dist/*
          python scripts/distribution_contract.py packages/polars-refkit/dist/*

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release_polars_refkit_cpython_${{ runner.os }}
          path: packages/polars-refkit/dist/*.whl
          retention-days: 7
          if-no-files-found: error

  build-polars-refkit-wasm:
    name: polars-refkit / Build PyEmscripten wheel (${{ matrix.python-version }})
    needs: check-release-version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.14"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Set up Pyodide
        id: pyodide
        uses: ./.github/actions/setup-pyodide

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: "v0.16.0"

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        env:
          CARGO_TARGET_WASM32_UNKNOWN_EMSCRIPTEN_RUSTFLAGS: ${{ steps.pyodide.outputs.rustflags }}
          HOST_CC: cc
          MATURIN_PYEMSCRIPTEN_PLATFORM_VERSION: ${{ steps.pyodide.outputs.pyodide-abi-version }}
        with:
          working-directory: packages/polars-refkit
          target: wasm32-unknown-emscripten
          args: --locked --release --out dist --interpreter ${{ matrix.python-version }}
          rust-toolchain: ${{ steps.pyodide.outputs.rust-toolchain }}

      - name: Check metadata
        run: |
          python -m scripts.normalize_wheel packages/polars-refkit/dist/*.whl
          uv run --locked --only-group build twine check --strict packages/polars-refkit/dist/*
          python scripts/distribution_contract.py packages/polars-refkit/dist/*

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release_polars_refkit_pyemscripten_${{ matrix.python-version }}
          path: packages/polars-refkit/dist/*.whl
          retention-days: 7
          if-no-files-found: error

  test-polars-refkit:
    name: polars-refkit / Test release artifacts
    needs:
      - build-refkit
      - build-refkit-core-wasm
      - build-polars-refkit-cpython
      - build-polars-refkit-wasm
    uses: ./.github/workflows/release-tests-polars-refkit.yml

  publish-polars-refkit:
    name: polars-refkit / Publish to PyPI
    needs:
      - check-release-version
      - source-checks
      - build-polars-refkit-sdist
      - build-polars-refkit-cpython
      - build-polars-refkit-wasm
      - test-polars-refkit
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release_polars_refkit_*
          merge-multiple: true
          path: dist/polars-refkit

      - name: Publish package
        run: |
          for whl in dist/polars-refkit/*.whl
          do
            unzip -qt "$whl"
          done
          uv run --locked --only-group build twine check --strict dist/polars-refkit/*
          python scripts/distribution_contract.py dist/polars-refkit/*
          uv publish --trusted-publishing always \
            --check-url https://pypi.org/simple \
            dist/polars-refkit/*

  release-complete:
    name: Release complete
    needs:
      - publish-refkit-core
      - publish-refkit
      - publish-polars-refkit
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check package publish results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python - <<'PY'
          import json
          import os

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {
              name: info["result"]
              for name, info in needs.items()
              if info["result"] != "success"
          }
          if failed:
              raise SystemExit(f"Release publish jobs did not all succeed: {failed}")
          PY

  release-notes:
    name: Update release notes
    needs: release-complete
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "26"
          package-manager-cache: false

      - name: Install release note generator
        working-directory: .github/release-notes
        run: |
          npm ci --ignore-scripts --omit=dev --no-audit --no-fund
          npm audit --omit=dev --audit-level=high

      - name: Update release notes
        run: .github/release-notes/node_modules/.bin/changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
