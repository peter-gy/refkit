name: Publish

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  check-release-version:
    name: Check release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Check package versions
        id: version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          release_version = tag[1:] if tag.startswith("v") else tag
          version_files = {
              "refkit": Path("packages/refkit/pyproject.toml"),
              "refkit-core": Path("packages/refkit-core-py/pyproject.toml"),
              "polars-refkit": Path("packages/polars-refkit/pyproject.toml"),
              "refkit-core-rs": Path("packages/refkit-core-rs/Cargo.toml"),
          }
          dependency_pins = {
              "refkit": {
                  "refkit-core": release_version,
              },
          }

          mismatches: list[str] = []
          for name, path in version_files.items():
              data = tomllib.loads(path.read_text(encoding="utf-8"))
              if "project" in data:
                  version = data["project"]["version"]
              else:
                  version = data["workspace"]["package"]["version"]
              if version != release_version:
                  mismatches.append(f"{name} has {version}, expected {release_version}")

          for package, expected_pins in dependency_pins.items():
              data = tomllib.loads(version_files[package].read_text(encoding="utf-8"))
              dependencies = data["project"].get("dependencies", [])
              for dependency_name, expected_version in expected_pins.items():
                  expected = f"{dependency_name}=={expected_version}"
                  if expected not in dependencies:
                      mismatches.append(f"{package} must depend on {expected}")

          if mismatches:
              raise SystemExit("\n".join(mismatches))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"version={release_version}", file=output)
          PY

  build-refkit-core-sdist:
    name: refkit-core / Build sdist
    needs: check-release-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Build sdist
        run: uv build --package refkit-core --sdist --out-dir dist/refkit-core --no-create-gitignore

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release_refkit_core_sdist
          path: dist/refkit-core/*.tar.gz
          retention-days: 7
          if-no-files-found: error

  build-refkit-core-cpython:
    name: refkit-core / Build CPython wheel (${{ matrix.os }})
    needs: check-release-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.11"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: packages/refkit-core-py
          args: --release --out dist --interpreter 3.11
          sccache: false

      - name: Check metadata
        run: uvx twine check --strict packages/refkit-core-py/dist/*

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release_refkit_core_cpython_${{ runner.os }}
          path: packages/refkit-core-py/dist/*.whl
          retention-days: 7
          if-no-files-found: error

  build-refkit-core-pyemscripten:
    name: refkit-core / Build PyEmscripten wheel (${{ matrix.python-version }})
    needs: check-release-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.14"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Install Pyodide build tools
        run: uv sync --locked --only-group pyodide-build

      - name: Get Pyodide config
        id: pyodide-config
        run: |
          {
            echo "rust-toolchain=$(uv run pyodide config get rust_toolchain)"
            echo "emscripten-version=$(uv run pyodide config get emscripten_version)"
            echo "pyodide-abi-version=$(uv run pyodide config get pyodide_abi_version)"
            echo "rustflags=$(uv run pyodide config get rustflags)"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Emscripten
        uses: emscripten-core/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16
        with:
          version: ${{ steps.pyodide-config.outputs.emscripten-version }}
          no-cache: true

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        env:
          CARGO_TARGET_WASM32_UNKNOWN_EMSCRIPTEN_RUSTFLAGS: ${{ steps.pyodide-config.outputs.rustflags }}
          MATURIN_PYEMSCRIPTEN_PLATFORM_VERSION: ${{ steps.pyodide-config.outputs.pyodide-abi-version }}
        with:
          working-directory: packages/refkit-core-py
          target: wasm32-unknown-emscripten
          args: --release --out dist --interpreter ${{ matrix.python-version }}
          rust-toolchain: ${{ steps.pyodide-config.outputs.rust-toolchain }}
          sccache: false

      - name: Check metadata
        run: uvx twine check --strict packages/refkit-core-py/dist/*

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release_refkit_core_pyemscripten_${{ matrix.python-version }}
          path: packages/refkit-core-py/dist/*.whl
          retention-days: 7
          if-no-files-found: error

  test-refkit-core:
    name: refkit-core / Test release artifacts
    needs:
      - build-refkit-core-sdist
      - build-refkit-core-cpython
      - build-refkit-core-pyemscripten
    uses: ./.github/workflows/release-tests.yml
    with:
      package: refkit-core

  publish-refkit-core:
    name: refkit-core / Publish to PyPI
    needs:
      - check-release-version
      - build-refkit-core-sdist
      - build-refkit-core-cpython
      - build-refkit-core-pyemscripten
      - test-refkit-core
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Check PyPI state
        id: pypi
        env:
          PACKAGE: refkit-core
          VERSION: ${{ needs.check-release-version.outputs.version }}
        run: |
          status=$(curl -s -o /dev/null -I -w "%{http_code}" "https://pypi.org/pypi/${PACKAGE}/${VERSION}/json")
          if [ "$status" = "200" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE} ${VERSION} is already on PyPI"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        if: steps.pypi.outputs.already_published != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release_refkit_core_*
          merge-multiple: true
          path: dist/refkit-core

      - name: Publish package
        if: steps.pypi.outputs.already_published != 'true'
        run: |
          for whl in dist/refkit-core/*.whl
          do
            unzip -qt "$whl"
          done
          uvx twine check --strict dist/refkit-core/*
          uv publish --trusted-publishing always dist/refkit-core/*

  build-refkit:
    name: refkit / Build distribution
    needs: check-release-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Build distribution
        run: uv build --package refkit --out-dir dist/refkit --no-create-gitignore

      - name: Check metadata
        run: uvx twine check --strict dist/refkit/*

      - name: Upload distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release_refkit_dist
          path: dist/refkit/*
          retention-days: 7
          if-no-files-found: error

  test-refkit:
    name: refkit / Test release artifacts
    needs:
      - build-refkit
      - build-refkit-core-cpython
      - build-refkit-core-pyemscripten
    uses: ./.github/workflows/release-tests.yml
    with:
      package: refkit

  publish-refkit:
    name: refkit / Publish to PyPI
    needs:
      - check-release-version
      - publish-refkit-core
      - build-refkit
      - test-refkit
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Check PyPI state
        id: pypi
        env:
          PACKAGE: refkit
          VERSION: ${{ needs.check-release-version.outputs.version }}
        run: |
          status=$(curl -s -o /dev/null -I -w "%{http_code}" "https://pypi.org/pypi/${PACKAGE}/${VERSION}/json")
          if [ "$status" = "200" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE} ${VERSION} is already on PyPI"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download distribution
        if: steps.pypi.outputs.already_published != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release_refkit_dist
          path: dist/refkit

      - name: Publish package
        if: steps.pypi.outputs.already_published != 'true'
        run: |
          uvx twine check --strict dist/refkit/*
          uv publish --trusted-publishing always dist/refkit/*

  build-polars-refkit-sdist:
    name: polars-refkit / Build sdist
    needs: check-release-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Build sdist
        run: uv build --package polars-refkit --sdist --out-dir dist/polars-refkit --no-create-gitignore

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release_polars_refkit_sdist
          path: dist/polars-refkit/*.tar.gz
          retention-days: 7
          if-no-files-found: error

  build-polars-refkit-cpython:
    name: polars-refkit / Build CPython wheel (${{ matrix.os }})
    needs: check-release-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.11"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: packages/polars-refkit
          args: --release --out dist --interpreter 3.11
          sccache: false

      - name: Check metadata
        run: uvx twine check --strict packages/polars-refkit/dist/*

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release_polars_refkit_cpython_${{ runner.os }}
          path: packages/polars-refkit/dist/*.whl
          retention-days: 7
          if-no-files-found: error

  test-polars-refkit:
    name: polars-refkit / Test release artifacts
    needs:
      - build-polars-refkit-sdist
      - build-polars-refkit-cpython
    uses: ./.github/workflows/release-tests.yml
    with:
      package: polars-refkit

  publish-polars-refkit:
    name: polars-refkit / Publish to PyPI
    needs:
      - check-release-version
      - build-polars-refkit-sdist
      - build-polars-refkit-cpython
      - test-polars-refkit
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Check PyPI state
        id: pypi
        env:
          PACKAGE: polars-refkit
          VERSION: ${{ needs.check-release-version.outputs.version }}
        run: |
          status=$(curl -s -o /dev/null -I -w "%{http_code}" "https://pypi.org/pypi/${PACKAGE}/${VERSION}/json")
          if [ "$status" = "200" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE} ${VERSION} is already on PyPI"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        if: steps.pypi.outputs.already_published != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release_polars_refkit_*
          merge-multiple: true
          path: dist/polars-refkit

      - name: Publish package
        if: steps.pypi.outputs.already_published != 'true'
        run: |
          for whl in dist/polars-refkit/*.whl
          do
            unzip -qt "$whl"
          done
          uvx twine check --strict dist/polars-refkit/*
          uv publish --trusted-publishing always dist/polars-refkit/*

  release-complete:
    name: Release complete
    needs:
      - publish-refkit-core
      - publish-refkit
      - publish-polars-refkit
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check package publish results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python - <<'PY'
          import json
          import os

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {
              name: info["result"]
              for name, info in needs.items()
              if info["result"] != "success"
          }
          if failed:
              raise SystemExit(f"Release publish jobs did not all succeed: {failed}")
          PY

  release-notes:
    name: Update release notes
    needs: release-complete
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "26"

      - name: Update release notes
        run: npx --yes changelogithub@14.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
