name: polars-refkit Release Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test-cpython:
    name: polars-refkit / Test CPython wheel (${{ matrix.os }}, py${{ matrix.python-version }}, ${{ matrix.polars }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-os: Linux
            python-version: "3.11"
            polars: polars==1.29.0
          - os: ubuntu-latest
            artifact-os: Linux
            python-version: "3.14"
            polars: polars
          - os: macos-15
            artifact-os: macOS
            python-version: "3.11"
            polars: polars==1.29.0
          - os: macos-15
            artifact-os: macOS
            python-version: "3.14"
            polars: polars
          - os: windows-latest
            artifact-os: Windows
            python-version: "3.11"
            polars: polars==1.29.0
          - os: windows-latest
            artifact-os: Windows
            python-version: "3.14"
            polars: polars
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false
          ignore-empty-workdir: true

      - name: Download wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release_polars_refkit_cpython_${{ matrix.artifact-os }}
          path: dist

      - name: Test installed package
        shell: bash
        run: |
          wheels=(dist/polars_refkit-*.whl)
          uv run --no-project --python "${{ matrix.python-version }}" --with "${{ matrix.polars }}" --with "${wheels[0]}" python - <<'PY'
          import polars as pl
          import polars_refkit

          assert polars_refkit
          df = pl.DataFrame(
              {
                  "bibtex": [
                      "@article{doe2024, title={Fast Citations}, year={2024}}",
                  ],
              }
          )
          out = df.select(count=pl.col("bibtex").refkit.entry_count())
          assert out.item() == 1
          PY

  test-pyemscripten:
    name: polars-refkit / Test PyEmscripten install
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Download refkit distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release_refkit_dist
          path: dist

      - name: Download refkit-core wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release_refkit_core_pyemscripten_3.14
          path: dist

      - name: Download polars-refkit wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release_polars_refkit_pyemscripten_3.14
          path: dist

      - name: Create Pyodide virtual environment
        uses: ./.github/actions/create-pyodide-venv

      - name: Test installed package
        run: |
          source .venv-pyodide/bin/activate
          python -m pip install -r .github/pyodide/pylock.314.toml
          python -m pip install refkit --no-index --find-links dist --force-reinstall
          python -m pip install dist/polars_refkit-*.whl
          python .github/pyodide/smoke_polars_refkit.py
          python -m pytest -q -c /dev/null \
            .github/pyodide/test_refkit_runtime.py \
            .github/pyodide/test_polars_refkit_runtime.py
