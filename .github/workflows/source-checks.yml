name: Source Checks

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  FORCE_COLOR: "1"
  RUST_BACKTRACE: "1"

permissions:
  contents: read

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Lint
        run: make python-lint

      - name: Check types
        run: make typecheck

      - name: Test
        run: make test

      - name: Check release contract
        run: make release-check

      - name: Check architecture contract
        run: make architecture-check

      - name: Check Pyodide runtime lock
        run: make pyodide-lock-check

  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            . -> target
            crates/bibtex-tidy-rs -> crates/bibtex-tidy-rs/target
            packages/polars-refkit/rust -> packages/polars-refkit/rust/target

      - name: Lint
        run: make rust-lint

      - name: Test
        run: make rust

  msrv:
    name: Rust 1.88
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Rust 1.88
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.88"

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: msrv
          workspaces: |
            . -> target
            crates/bibtex-tidy-rs -> crates/bibtex-tidy-rs/target
            packages/polars-refkit/rust -> packages/polars-refkit/rust/target

      - name: Check minimum Rust version
        run: make rust-floor

  release-notes:
    name: Release notes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "26"
          package-manager-cache: false

      - name: Check release note generator
        working-directory: .github/release-notes
        run: |
          npm ci --ignore-scripts --omit=dev --no-audit --no-fund
          npm audit --omit=dev --audit-level=high
          ./node_modules/.bin/changelogithub --version
