[package]
name = "polars_refkit"
version = "0.0.1"
edition = "2024"
rust-version = "1.85"
license = "Apache-2.0"
description = "Polars expression plugin for refkit citation and BibTeX workflows"
repository = "https://github.com/petergy/refkit"
include = [
    "/Cargo.toml",
    "/src",
]

[workspace]
resolver = "3"

[lib]
name = "polars_refkit"
crate-type = ["cdylib"]

[features]
default = []
extension-module = ["pyo3/extension-module", "pyo3/abi3-py311"]

[dependencies]
polars = { version = "=0.50.0", default-features = false }
polars-core = { version = "=0.50.0", default-features = false, features = ["dtype-struct"] }
pyo3 = "0.25"
pyo3-polars = { version = "=0.23.1", features = ["derive"] }
refkit-core = { path = "../../../crates/refkit-core" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
