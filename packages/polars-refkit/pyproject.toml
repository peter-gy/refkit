[project]
name = "polars-refkit"
version = "0.0.1"
description = "Polars expression plugin for refkit citation and BibTeX workflows"
readme = "README.md"
license = "MIT OR Apache-2.0"
license-files = ["LICENSE-APACHE", "LICENSE-MIT"]
authors = [
    { name = "Péter Ferenc Gyarmati", email = "dev.petergy@gmail.com" }
]
requires-python = ">=3.11,<3.15"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Rust",
    "Typing :: Typed",
]
dependencies = [
    "polars>=1.41,<1.42",
]

[build-system]
requires = [
    "maturin>=1.9,<2",
    "polars>=1.41,<1.42",
]
build-backend = "maturin"

[tool.maturin]
module-name = "polars_refkit._internal"
bindings = "pyo3"
features = ["extension-module"]
editable-profile = "dev"
strip = true
