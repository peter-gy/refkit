[package]
name = "refkit"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
readme = "README.md"
description = "Python bindings for fast citation parsing, rendering, and BibTeX editing"
repository.workspace = true
include = [
    "/Cargo.toml",
    "/LICENSE",
    "/pyproject.toml",
    "/README.md",
    "/src",
    "/tests",
]

[lib]
name = "_native"
crate-type = ["cdylib", "rlib"]

[features]
default = []
extension-module = ["pyo3/extension-module", "pyo3/abi3-py311"]

[dependencies]
pyo3 = "0.28.2"
refkit-core = { path = "../../crates/refkit-core" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"

[dev-dependencies]
pyo3 = { version = "0.28.2", features = ["auto-initialize"] }
