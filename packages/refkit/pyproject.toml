[project]
name = "refkit"
version = "0.0.1"
description = "Fast Python citation parsing, rendering, and BibTeX editing backed by Rust"
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE-APACHE"]
authors = [
    { name = "Péter Ferenc Gyarmati", email = "dev.petergy@gmail.com" }
]
requires-python = ">=3.11,<3.15"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Rust",
    "Typing :: Typed",
]
dependencies = []

[build-system]
requires = ["maturin>=1.9,<2"]
build-backend = "maturin"

[tool.maturin]
python-source = "src"
module-name = "refkit._native"
bindings = "pyo3"
features = ["extension-module"]
editable-profile = "dev"
strip = true
